name: Build WASM
on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Upstream source is expected to be a git submodule of this repo.
          # If you vendor it differently, replace this with an explicit clone.
          submodules: recursive
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasmify
        run: nix develop --command bash -lc 'make tools'

      # Cache wasmify state.
      # - .wasmify/   per-project build cache (.o / .a / cache.json)
      # - ~/.config/wasmify/bin/wasi-sdk   shared toolchain (~500MB tarball)
      # The key is bumped whenever config, bridge, or probe scripts that affect
      # the build change; the pinned wasi-sdk version (31.0) is in the key so
      # bumping the SDK version busts old caches automatically.
      - name: Cache wasmify state
        uses: actions/cache@v4
        with:
          path: |
            .wasmify
            ~/.config/wasmify/bin/wasi-sdk
          key: wasmify-31.0-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'wasmify.json', 'api-spec.json', 'proto/**', 'bridge/**', 'tools/wasm/**', 'tools/libvips/**', 'Makefile') }}
          restore-keys: |
            wasmify-31.0-${{ runner.os }}-${{ runner.arch }}-

      - name: Install build tools and wasi-sdk
        # Runs inside the repo flake so Go, binaryen, Meson, Ninja, CMake,
        # pkg-config, protobuf, and buf match local development.
        run: nix develop --command bash -lc 'make wasi-sdk'
      - name: Build WASM
        run: nix develop --command bash -lc 'make verify'
      - name: Production audit
        run: nix develop --command bash -lc 'make audit-production'
      - name: Attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'internal/vipswasm.wasm'
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: internal/vipswasm.wasm
