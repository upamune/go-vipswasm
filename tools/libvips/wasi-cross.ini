[binaries]
c = '@ROOT@/tools/libvips/wasi-clang-filter.sh'
cpp = '@ROOT@/tools/libvips/wasi-clang-filter.sh'
ar = '@WASI_SDK@/bin/llvm-ar'
strip = '@WASI_SDK@/bin/llvm-strip'
pkg-config = 'pkg-config'

[built-in options]
c_args = ['--target=wasm32-wasip1', '-mno-atomics', '-mllvm', '-wasm-enable-sjlj', '-D_WASI_EMULATED_PROCESS_CLOCKS', '-D_WASI_EMULATED_SIGNAL', '-D_WASI_EMULATED_MMAN', '-D_WASI_EMULATED_GETPID']
cpp_args = ['--target=wasm32-wasip1', '-mno-atomics', '-mllvm', '-wasm-enable-sjlj', '-D_WASI_EMULATED_PROCESS_CLOCKS', '-D_WASI_EMULATED_SIGNAL', '-D_WASI_EMULATED_MMAN', '-D_WASI_EMULATED_GETPID']
c_link_args = ['--target=wasm32-wasip1', '-mllvm', '-wasm-enable-sjlj', '-lwasi-emulated-process-clocks', '-lwasi-emulated-signal', '-lwasi-emulated-mman', '-lwasi-emulated-getpid', '-lsetjmp']
cpp_link_args = ['--target=wasm32-wasip1', '-mllvm', '-wasm-enable-sjlj', '-lwasi-emulated-process-clocks', '-lwasi-emulated-signal', '-lwasi-emulated-mman', '-lwasi-emulated-getpid', '-lsetjmp']

[host_machine]
system = 'wasi'
cpu_family = 'wasm32'
cpu = 'wasm32'
endian = 'little'
